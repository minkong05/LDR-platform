<!-- apps/dashboard/dashboard/templates/base.html -->
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}LDR Platform{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='custom.css') }}" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-warning" href="/">
      <i class="bi bi-shield-shaded me-2"></i>LDR Platform
    </a>
    <div class="navbar-nav ms-3">
      <a class="nav-link {% if request.path.startswith('/alerts') %}active{% endif %}"
         href="{{ url_for('alerts.list_alerts') }}">
        <i class="bi bi-bell me-1"></i>Alerts
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4 px-4">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
{% block scripts %}{% endblock %}
</body>
</html>
