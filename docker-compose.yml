services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ldr
      POSTGRES_PASSWORD: ldr
      POSTGRES_DB: ldr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ldr -d ldr"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: >
      sh -lc "cd apps/backend
      && alembic upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      DETECTION_INTERVAL_SECONDS: ${DETECTION_INTERVAL_SECONDS:-30}
      DETECTION_LOOKBACK_MINUTES: ${DETECTION_LOOKBACK_MINUTES:-30}
      RULES_DIR: ${RULES_DIR:-/app/rules}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
